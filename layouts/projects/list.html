{{ define "main" }}
  <article>
    <header class="max-w-prose">
      <h1 class="jp-page-title">{{ .Title | emojify }}</h1>
    </header>
    <section class="prose mt-0 flex max-w-full flex-col dark:prose-invert lg:flex-row">
      <div class="min-h-0 min-w-0 max-w-prose grow">
        {{ .Content | emojify }}
      </div>
    </section>
  </article>
{{ end }}
